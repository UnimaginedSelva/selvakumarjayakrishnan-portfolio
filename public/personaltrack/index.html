<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="LifeArch" />
  <meta name="description" content="Personal financial tracking and health ritual dashboard" />

  <title>LifeArch — Personal Dashboard</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="/personaltrack/manifest.json" />

  <!-- Apple Touch Icons (fallback — replace with real icons when ready) -->
  <link rel="apple-touch-icon" href="icon-192.png" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body {
      background: #0f172a;
      color: #f1f5f9;
      font-family: 'DM Sans', sans-serif;
      overscroll-behavior: none;
    }
    /* Splash screen while React loads */
    #splash {
      position: fixed; inset: 0;
      background: #0f172a;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px; z-index: 999;
      transition: opacity 0.4s;
    }
    #splash.hidden { opacity: 0; pointer-events: none; }
    #splash-logo {
      font-family: 'DM Sans', sans-serif;
      font-size: 32px; font-weight: 700; letter-spacing: -1px;
      color: #f1f5f9;
    }
    #splash-logo span { color: #3b82f6; }
    #splash-sub { font-size: 13px; color: #475569; }
    .splash-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #2563eb; display: inline-block;
      animation: pulse 1.2s ease-in-out infinite;
      margin: 0 3px;
    }
    .splash-dot:nth-child(2) { animation-delay: 0.2s; }
    .splash-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>

  <!-- Splash screen -->
  <div id="splash">
    <div id="splash-logo"><span>Life</span>Arch</div>
    <div id="splash-sub">Personal Dashboard</div>
    <div style="margin-top: 8px;">
      <span class="splash-dot"></span>
      <span class="splash-dot"></span>
      <span class="splash-dot"></span>
    </div>
  </div>

  <!-- React root -->
  <div id="root"></div>

  <!-- React + ReactDOM (UMD, no build step) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <!-- App -->
  <script src="app.js"></script>

  <!-- Service Worker registration -->
  <script>
    // Hide splash once app renders
    window.addEventListener('load', () => {
      setTimeout(() => {
        const splash = document.getElementById('splash');
        if (splash) splash.classList.add('hidden');
        setTimeout(() => { if (splash) splash.remove(); }, 500);
      }, 600);
    });

    // Register service worker for offline support
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/personaltrack/sw.js')
          .then(reg => console.log('SW registered:', reg.scope))
          .catch(err => console.log('SW registration failed:', err));
      });
    }
  </script>

</body>
</html>
